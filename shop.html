<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google Tag Manager / Clarity Analytics (같은 트래킹 공유) -->
    <script>(function (w, d, s, l, i) {
            w[l] = w[l] || []; w[l].push({
                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-KF4LZQTB');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파라다이스 공식 스토어 - 영웅님 활동비 후원</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            word-break: keep-all;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="text-gray-900 leading-snug">
    <main class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative pb-20">
        
        <!-- 헤더 영역 -->
        <header class="sticky top-0 z-50 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm">
            <a href="index.html" class="flex items-center text-gray-500 font-bold hover:text-gray-800">
                <svg class="w-6 h-6 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                홈으로
            </a>
            <h1 class="text-xl font-extrabold text-[#00563F]">파라다이스 스토어</h1>
            <div class="w-8"></div> <!-- 균형을 위한 빈 공간 -->
        </header>

        <!-- 알림 문구 -->
        <div class="bg-[#FFF3E0] px-4 py-3 text-center border-b-2 border-[#FFB300]">
            <p class="text-sm font-bold text-gray-700">
                👇 아래 상품을 구경만 하셔도 <span class="text-[#D84315] font-extrabold">영웅님 1위 투표 활동비</span>가 적립됩니다!
            </p>
        </div>

        <!-- 1등 상품 (Hero Section) -->
        <section id="hero-section" class="p-4 bg-white hidden">
            <div class="text-center mb-3">
                <span class="inline-block bg-red-600 text-white text-sm font-extrabold px-3 py-1 rounded-full animate-pulse">👑 오늘의 강력 추천 1위</span>
            </div>
            <a id="hero-link" href="#" target="_blank" class="block bg-white rounded-2xl border-4 border-red-500 overflow-hidden shadow-lg transform active:scale-95 transition-transform">
                <div class="relative w-full pb-[100%]">
                    <img id="hero-img" src="" alt="추천 상품" class="absolute top-0 left-0 w-full h-full object-cover">
                </div>
                <div class="p-4 bg-gradient-to-b from-white to-red-50">
                    <h2 id="hero-title" class="text-lg font-extrabold text-gray-800 line-clamp-2 mb-2"></h2>
                    <p id="hero-price" class="text-3xl font-black text-[#D84315]"></p>
                    <div class="mt-3 bg-red-600 text-white text-center font-bold py-3 rounded-xl text-lg">
                        👉 영웅님 후원하며 구경하기
                    </div>
                </div>
            </a>
        </section>

        <!-- 갤러리 섹션 (2위~N위) -->
        <section class="p-4 bg-gray-50">
            <h3 class="text-lg font-extrabold text-gray-800 mb-4 pl-1 border-l-4 border-[#00563F]">🌟 인기 폭발 골드박스 특가</h3>
            <div id="product-grid" class="grid grid-cols-2 gap-3">
                <!-- 상품들이 JS로 삽입됩니다 -->
            </div>
        </section>

        <!-- 로딩 표시 -->
        <div id="loading-spinner" class="py-10 text-center">
            <div class="inline-block w-8 h-8 border-4 border-[#00563F] border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-3 text-gray-500 font-bold">특가 상품을 불러오는 중입니다...</p>
        </div>

    </main>

    <!-- 하단 고정 구매 안내 -->
    <div class="fixed bottom-0 left-0 right-0 z-50 p-3 bg-white/95 backdrop-blur-sm border-t border-gray-200">
        <div class="max-w-md mx-auto text-center">
            <p class="text-xs font-bold text-gray-500">
                ※ 이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // cache busting을 위해 타임스탬프 추가
                const response = await fetch('shop_data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('데이터를 불러올 수 없습니다.');
                
                const products = await response.json();
                if (!products || products.length === 0) throw new Error('상품이 없습니다.');

                document.getElementById('loading-spinner').style.display = 'none';

                // 1. Hero 상품 세팅 (0번째 상품)
                const hero = products[0];
                document.getElementById('hero-link').href = hero.productUrl;
                document.getElementById('hero-img').src = hero.productImage;
                document.getElementById('hero-title').innerText = hero.productName;
                document.getElementById('hero-price').innerText = hero.productPrice.toLocaleString() + '원';
                document.getElementById('hero-section').classList.remove('hidden');

                // 2. 나머지 상품들 그리드 세팅 (1번째부터 전부)
                const grid = document.getElementById('product-grid');
                let html = '';
                for (let i = 1; i < products.length; i++) {
                    const p = products[i];
                    html += `
                    <a href="${p.productUrl}" target="_blank" class="flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden active:scale-95 transition-transform hover:border-[#00563F]">
                        <div class="relative w-full pb-[100%] bg-gray-100">
                            <img src="${p.productImage}" alt="상품" class="absolute top-0 left-0 w-full h-full object-cover">
                        </div>
                        <div class="p-3 flex flex-col flex-grow justify-between">
                            <h4 class="text-sm font-bold text-gray-800 line-clamp-2 leading-snug mb-1">${p.productName}</h4>
                            <div>
                                <span class="text-xs text-gray-400 line-through block mb-0.5">정가대비 특가</span>
                                <span class="text-lg font-black text-[#D84315]">${p.productPrice.toLocaleString()}원</span>
                            </div>
                        </div>
                    </a>
                    `;
                }
                grid.innerHTML = html;

            } catch (error) {
                console.error(error);
                document.getElementById('loading-spinner').innerHTML = `<p class="text-red-500 font-bold">상품 정보를 불러오는데 실패했습니다. 새로고침 해주세요.</p>`;
            }
        });
    </script>
</body>
</html>
